<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Artista | Juntos Hacia Dios</title>
<meta name="description" content="Perfil de artista o ministerio con canciones, álbumes y colaboraciones.">
<link rel="stylesheet" href="style.css?v=4"><link rel="stylesheet" href="detalles.css?v=1">
<style>
.song-page-section{max-width:1080px;padding-top:36px}.artist-hero-card{display:flex;align-items:center;gap:24px;background:var(--card);border:1px solid var(--border);border-radius:22px;padding:30px;box-shadow:var(--shadow);margin-bottom:22px}.artist-avatar-public{display:grid;place-items:center;width:118px;height:118px;min-width:118px;border-radius:50%;background:var(--gold);color:#151515;font-size:2.4rem;font-weight:900}.artist-hero-card h1,.artist-profile-section h2{margin:0;color:var(--gold)}.artist-hero-card p,.artist-profile-section-header p{color:var(--muted);line-height:1.6}.artist-profile-stats,.artist-profile-actions,.artist-socials{display:flex;flex-wrap:wrap;gap:9px;margin-top:15px}.artist-profile-stats span,.artist-profile-actions a,.artist-social-link{display:inline-flex;align-items:center;justify-content:center;min-height:36px;padding:8px 13px;border:1px solid rgba(246,196,83,.28);border-radius:999px;background:rgba(246,196,83,.12);color:var(--gold);font-weight:850;font-size:.86rem;text-decoration:none}.artist-profile-actions a:hover,.artist-social-link:hover{background:var(--gold);color:#151515}.artist-profile-section{margin:30px 0}.artist-profile-section-header{display:flex;align-items:end;justify-content:space-between;gap:14px;margin-bottom:14px;padding-bottom:11px;border-bottom:1px solid var(--border)}.artist-search{width:100%;padding:15px 18px;border:1px solid var(--border);border-radius:999px;background:var(--card);color:var(--text);outline:none}.artist-song-list{display:grid;gap:10px}.artist-song-row{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center;padding:16px 18px;border:1px solid var(--border);border-radius:18px;background:var(--card);color:var(--text);text-decoration:none}.artist-song-row:hover{border-color:rgba(246,196,83,.55);background:var(--card-soft)}.artist-song-row h3{margin:0 0 6px}.artist-song-row p{margin:0;color:var(--muted);font-size:.92rem}.artist-row-icon{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;background:rgba(246,196,83,.13);color:var(--gold);font-size:1.3rem;font-weight:900}.artist-category-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.artist-category-card{display:flex;justify-content:space-between;gap:8px;padding:14px;border:1px solid var(--border);border-radius:16px;background:var(--card);color:var(--text);text-decoration:none}.artist-category-card strong{color:var(--gold)}.artist-category-card small,.artist-empty{color:var(--muted)}.artist-empty{padding:17px;border:1px dashed var(--border);border-radius:16px;background:var(--card-soft)}@media(max-width:700px){.song-page-section{padding-top:22px}.artist-hero-card{display:block;padding:22px}.artist-avatar-public{margin:0 auto 18px;width:132px;height:132px}.artist-category-grid{grid-template-columns:1fr}.artist-profile-actions{flex-wrap:nowrap;overflow:auto}.artist-profile-actions a{white-space:nowrap}}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="Supabase.js?v=1"></script>
</head>
<body>
<header><nav class="navbar"><a class="brand" href="index.html"><span class="brand-icon">✝</span><span>Juntos Hacia Dios</span></a><button class="menu-toggle" id="menuToggle" type="button">☰</button><div class="nav-menu" id="navMenu"><a href="index.html">Inicio</a><a href="canciones.html">Canciones</a><a class="active" href="artistas.html">Artistas</a><a href="categorias.html">Categorías</a><a href="albumes.html">Álbumes</a><a href="donaciones.html">Donaciones</a><button class="theme-toggle" id="themeToggle" type="button">🌙</button></div></nav></header>
<main><section class="section song-page-section"><div id="artistProfile"><article class="artist-hero-card shimmer-card"><div class="artist-avatar-public">…</div><div><p class="hero-kicker">Cargando artista</p><h1>Un momento por favor</h1><p>Estamos preparando su perfil.</p></div></article></div></section></main>
<footer><p>© <span id="year">2026</span> Juntos Hacia Dios</p><p><a href="artistas.html">Artistas</a> · <a href="canciones.html">Canciones</a> · <a href="categorias.html">Categorías</a></p></footer>
<script>
const db=window.supabaseClient,$=(s)=>document.querySelector(s),params=new URLSearchParams(location.search),id=params.get('id'),slug=params.get('slug');
const esc=(v)=>String(v||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;');
const norm=(v)=>String(v||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
const type=(v)=>({catolico:'Católico',cristiano:'Cristiano',mixto:'Mixto'})[norm(v)]||'Artista';
const initials=(v)=>String(v||'JHD').trim().split(/\s+/).slice(0,2).map(x=>x[0]||'').join('').toUpperCase();
const legacy=(v)=>{const raw=String(v||''),m=raw.match(/<!--JHD_ARTIST_META:([\s\S]*?)-->\s*$/);let meta={};try{meta=m?JSON.parse(m[1]):{}}catch(_){ }return{bio:raw.replace(/<!--JHD_ARTIST_META:[\s\S]*?-->\s*$/,'').trim(),links:meta.links||{},featured:meta.featuredSongIds||[]}};
const songMeta=(s)=>[type(s.song_type),s.tone?`Tono ${s.tone}`:'',s.difficulty||''].filter(Boolean).join(' · ')||'Canto disponible';
function nav(){const menu=$('#navMenu'),btn=$('#menuToggle'),theme=$('#themeToggle');btn?.addEventListener('click',()=>menu?.classList.toggle('open'));const light=localStorage.getItem('jhd-theme')==='light';document.body.classList.toggle('light-mode',light);if(theme)theme.textContent=light?'☀️':'🌙';theme?.addEventListener('click',()=>{const on=document.body.classList.toggle('light-mode');localStorage.setItem('jhd-theme',on?'light':'dark');theme.textContent=on?'☀️':'🌙'})}
function empty(text){return `<div class="artist-empty">${esc(text)}</div>`}
function rows(songs,cats,extra){return songs.map(s=>{const cs=(cats.get(String(s.id))||[]).map(x=>x.name).filter(Boolean);const searchable=norm([s.title,s.tone,s.song_type,s.difficulty,cs.join(' '),extra?.(s)||''].join(' '));return `<a class="artist-song-row profile-song" data-search="${esc(searchable)}" href="cancion.html?id=${encodeURIComponent(s.id)}"><div><h3>${esc(s.title||'Canto sin título')}</h3><p>${esc(extra?.(s)||songMeta(s))}</p></div><span class="artist-row-icon">›</span></a>`}).join('')}
async function load(){const box=$('#artistProfile');if(!db||(!id&&!slug)){box.innerHTML=empty('Artista no encontrado.');return}let q=db.from('artists').select('*');q=id?q.eq('id',id):q.eq('slug',slug);const {data:artist,error}=await q.maybeSingle();if(error||!artist){box.innerHTML=empty('Este artista no existe o fue eliminado.');return}const old=legacy(artist.description),bio=artist.bio||old.bio,links={youtube:artist.youtube_url||old.links.youtube,spotify:artist.spotify_url||old.links.spotify,instagram:artist.instagram_url||old.links.instagram,facebook:artist.facebook_url||old.links.facebook};document.title=`${artist.name||'Artista'} | Juntos Hacia Dios`;
const own=await db.from('song_artists').select('song_id').eq('artist_id',artist.id);if(own.error){box.innerHTML=empty('No se pudieron cargar las canciones.');return}const ids=[...new Set((own.data||[]).map(x=>x.song_id).filter(Boolean))];const [songsRes,relationsRes,albumsRes,catsRes,featuredRes]=await Promise.all([ids.length?db.from('songs').select('*').in('id',ids):Promise.resolve({data:[],error:null}),ids.length?db.from('song_artists').select('song_id,artist_id,artists(id,name)').in('song_id',ids):Promise.resolve({data:[],error:null}),db.from('albums').select('*').eq('artist_id',artist.id).order('title'),ids.length?db.from('song_categories').select('song_id,categories(id,name)').in('song_id',ids):Promise.resolve({data:[],error:null}),db.from('artist_featured_songs').select('song_id,sort_order').eq('artist_id',artist.id).order('sort_order')]);
if(songsRes.error||relationsRes.error||albumsRes.error||catsRes.error){box.innerHTML=empty('No se pudo completar el perfil.');return}const songs=(songsRes.data||[]).slice().sort((a,b)=>String(a.title||'').localeCompare(String(b.title||''),'es'));const byId=new Map(songs.map(s=>[String(s.id),s]));const featureIds=!featuredRes.error&&(featuredRes.data||[]).length?(featuredRes.data||[]).map(x=>String(x.song_id)):old.featured;const featured=featureIds.map(x=>byId.get(String(x))).filter(Boolean);const cats=new Map();(catsRes.data||[]).forEach(x=>{if(!cats.has(String(x.song_id)))cats.set(String(x.song_id),[]);if(x.categories)cats.get(String(x.song_id)).push(x.categories)});const rel=new Map();(relationsRes.data||[]).forEach(x=>{if(!rel.has(String(x.song_id)))rel.set(String(x.song_id),[]);if(x.artists)rel.get(String(x.song_id)).push(x.artists)});const collabs=songs.filter(s=>(rel.get(String(s.id))||[]).some(a=>String(a.id)!==String(artist.id)));const other=(s)=>(rel.get(String(s.id))||[]).filter(a=>String(a.id)!==String(artist.id)).map(a=>a.name).filter(Boolean).join(' · ');const catCount=new Map();cats.forEach(list=>list.forEach(c=>catCount.set(String(c.id),{name:c.name,count:(catCount.get(String(c.id))?.count||0)+1})));const social=[['youtube','▶','YouTube'],['spotify','♫','Spotify'],['instagram','◎','Instagram'],['facebook','f','Facebook']].map(([key,icon,label])=>{try{const u=new URL(links[key]||'');return /^https?:$/.test(u.protocol)?`<a class="artist-social-link" href="${esc(u.href)}" target="_blank" rel="noopener noreferrer">${icon} ${label}</a>`:''}catch(_){return''}}).join('');
box.innerHTML=`<section class="artist-hero-card"><div class="artist-avatar-public">${esc(initials(artist.name))}</div><div><p class="hero-kicker">${esc(type(artist.artist_type))}</p><h1>${esc(artist.name||'Sin nombre')}</h1><p>${esc(bio||'Ministerio o artista registrado.')}</p><div class="artist-profile-stats"><span>${songs.length} canto${songs.length===1?'':'s'}</span><span>${albumsRes.data?.length||0} álbum${(albumsRes.data?.length||0)===1?'':'es'}</span><span>${collabs.length} colaboración${collabs.length===1?'':'es'}</span></div>${social?`<div class="artist-socials">${social}</div>`:''}<nav class="artist-profile-actions"><a href="#destacadasArtista">Destacadas</a><a href="#cancionesArtista">Canciones</a><a href="#albumesArtista">Álbumes</a><a href="#colaboracionesArtista">Colaboraciones</a><a href="#categoriasArtista">Categorías</a></nav></div></section><section class="artist-profile-section"><label for="artistSearch">Buscar canciones de este artista</label><input class="artist-search" id="artistSearch" type="search" placeholder="Buscar por título, tono o categoría..."></section><section class="artist-profile-section" id="destacadasArtista"><div class="artist-profile-section-header"><div><p class="hero-kicker">Para comenzar</p><h2>Canciones destacadas</h2><p>${featured.length?'Selección elegida desde el perfil del artista.':'Las más recientes que se han agregado a este perfil.'}</p></div></div><div class="artist-song-list">${rows(featured.length?featured:songs.slice(0,3),cats)||empty('Este artista aún no tiene cantos.')}</div></section><section class="artist-profile-section" id="cancionesArtista"><div class="artist-profile-section-header"><div><p class="hero-kicker">Cancionero</p><h2>Cantos de este artista</h2></div><p>${songs.length} en total</p></div><div class="artist-song-list">${rows(songs,cats)||empty('Este artista aún no tiene cantos.')}</div></section><section class="artist-profile-section" id="albumesArtista"><div class="artist-profile-section-header"><div><p class="hero-kicker">Discografía</p><h2>Álbumes</h2></div></div><div class="artist-song-list">${(albumsRes.data||[]).map(a=>`<a class="artist-song-row" href="albumes.html?album=${encodeURIComponent(a.slug||a.title||a.id)}"><div><h3>${esc(a.title||'Álbum')}</h3><p>${esc(a.description||'Álbum registrado')}</p></div><span class="artist-row-icon">♪</span></a>`).join('')||empty('Este artista aún no tiene álbumes.')}</div></section><section class="artist-profile-section" id="colaboracionesArtista"><div class="artist-profile-section-header"><div><p class="hero-kicker">Juntos en canción</p><h2>Colaboraciones</h2></div></div><div class="artist-song-list">${rows(collabs,cats,s=>other(s)?`Con ${other(s)} · ${songMeta(s)}`:songMeta(s))||empty('Aún no hay colaboraciones registradas.')}</div></section><section class="artist-profile-section" id="categoriasArtista"><div class="artist-profile-section-header"><div><p class="hero-kicker">Dónde aparece</p><h2>Categorías</h2></div></div><div class="artist-category-grid">${[...catCount.values()].sort((a,b)=>b.count-a.count).map(c=>`<a class="artist-category-card" href="canciones.html?categoria=${encodeURIComponent(c.name)}"><strong>${esc(c.name)}</strong><small>${c.count} canto${c.count===1?'':'s'}</small></a>`).join('')||empty('Todavía no hay categorías asignadas.')}</div></section>`;
$('#artistSearch')?.addEventListener('input',e=>{const q=norm(e.target.value);document.querySelectorAll('.profile-song').forEach(row=>row.style.display=!q||(row.dataset.search||'').includes(q)?'':'none')});}
nav();load();$('#year').textContent=new Date().getFullYear();
</script>
</body></html>
