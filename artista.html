<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Artista | Juntos Hacia Dios</title>
  <meta name="description" content="Perfil de artista, canciones, álbumes y colaboraciones.">
  <link rel="stylesheet" href="style.css?v=2">
  <link rel="stylesheet" href="detalles.css?v=1">
  <style>
    .artist-profile-card{display:grid;gap:18px;padding:26px;border:1px solid var(--border);border-radius:24px;background:var(--card)}
    .artist-profile-head{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
    .artist-profile-avatar{width:72px;height:72px;display:grid;place-items:center;border-radius:22px;background:var(--gold);color:#151515;font-size:1.35rem;font-weight:900}
    .artist-profile-card h1{margin:0}.artist-profile-card p{margin:0;color:var(--muted);line-height:1.65}
    .artist-section{margin-top:28px}.artist-section .section-heading{margin-bottom:14px}
    .artist-song-list{display:grid;gap:10px}.artist-song-row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px 18px;border:1px solid var(--border);border-radius:17px;background:var(--card);text-decoration:none;color:var(--text)}
    .artist-song-row:hover{border-color:var(--gold);transform:translateY(-2px)}.artist-song-row h3{margin:4px 0}.artist-song-row p{margin:0;color:var(--muted)}
    .artist-more{margin-top:14px;border:1px solid var(--border);border-radius:18px;background:var(--card-soft);padding:14px}.artist-more summary{cursor:pointer;color:var(--gold);font-weight:800}.artist-more .artist-song-list{margin-top:14px}
    .artist-empty{padding:18px;border:1px dashed var(--border);border-radius:16px;color:var(--muted)}
    @media(max-width:560px){.artist-profile-card{padding:20px}.artist-song-row{padding:14px}.artist-song-row>span{display:none}}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="Supabase.js?v=1"></script>
</head>
<body>
  <header>
    <nav class="navbar">
      <a class="brand" href="index.html" aria-label="Juntos Hacia Dios"><span class="brand-icon">✝</span><span>Juntos Hacia Dios</span></a>
      <button class="menu-toggle" id="menuToggle" type="button" aria-label="Abrir menú">☰</button>
      <div class="nav-menu" id="navMenu">
        <a href="index.html">Inicio</a><a href="canciones.html">Canciones</a><a class="active" href="artistas.html">Artistas</a><a href="categorias.html">Categorías</a><a href="albumes.html">Álbumes</a><a href="donaciones.html">Donaciones</a><button class="theme-toggle" id="themeToggle" type="button">🌙</button>
      </div>
    </nav>
  </header>
  <main>
    <section class="hero"><div class="hero-content"><p class="hero-kicker">Artista</p><h1 id="pageTitle">Cargando perfil...</h1><p id="pageSubtitle">Un momento por favor.</p></div></section>
    <section class="section" id="artistProfile"><article class="artist-profile-card"><p>Cargando información del artista...</p></article></section>
  </main>
  <footer><p>© <span id="year">2026</span> Juntos Hacia Dios</p><p><a href="index.html">Inicio</a> · <a href="artistas.html">Artistas</a> · <a href="canciones.html">Canciones</a></p></footer>
  <script>
    const db = window.supabaseClient;
    const $ = (selector) => document.querySelector(selector);
    const params = new URLSearchParams(location.search);
    const idParam = params.get('id');
    const slugParam = params.get('slug');
    const esc = (value) => String(value || '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;');
    const norm = (value) => String(value || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    const slugify = (value) => norm(value).replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)+/g,'');
    const initials = (name) => String(name || 'JHD').split(/\s+/).slice(0,2).map((part) => part[0] || '').join('').toUpperCase();
    const dateValue = (song) => { const value = Date.parse(song.created_at || song.updated_at || ''); return Number.isFinite(value) ? value : 0; };
    const orderSongs = (items) => [...items].sort((a,b) => dateValue(b) - dateValue(a) || String(a.title || '').localeCompare(String(b.title || ''),'es'));

    function initNav(){
      const menu = $('#navMenu'), button = $('#menuToggle'), theme = $('#themeToggle');
      button?.addEventListener('click', () => menu?.classList.toggle('open'));
      const light = localStorage.getItem('jhd-theme') === 'light';
      document.body.classList.toggle('light-mode', light); if(theme) theme.textContent = light ? '☀️' : '🌙';
      theme?.addEventListener('click', () => { const on = document.body.classList.toggle('light-mode'); localStorage.setItem('jhd-theme', on ? 'light':'dark'); theme.textContent = on ? '☀️':'🌙'; });
    }
    function songRow(song){
      return `<a class="artist-song-row" href="cancion.html?id=${encodeURIComponent(song.id)}"><div><p>${esc(song.song_type || 'Canción')}${song.tone ? ` · Tono ${esc(song.tone)}` : ''}</p><h3>${esc(song.title || 'Canción sin título')}</h3></div><span>›</span></a>`;
    }
    function albumCard(album){
      return `<a class="quick-card" href="albumes.html?album=${encodeURIComponent(album.slug || album.title || album.id)}"><p class="hero-kicker">Álbum</p><h3>${esc(album.title || 'Sin título')}</h3><p>${esc(album.description || 'Ver canciones de este álbum.')}</p></a>`;
    }
    function collaborationCard(person, songCount){
      const key = person.slug || slugify(person.name);
      return `<a class="quick-card" href="artista.html?slug=${encodeURIComponent(key)}"><p class="hero-kicker">${songCount} ${songCount === 1 ? 'canción compartida' : 'canciones compartidas'}</p><h3>${esc(person.name || 'Artista')}</h3><p>${esc(person.artist_type || 'Colaboración')}</p></a>`;
    }
    function empty(text){ return `<div class="artist-empty">${esc(text)}</div>`; }

    async function loadProfile(){
      const container = $('#artistProfile');
      if (!db || (!idParam && !slugParam)){ container.innerHTML = empty('No se encontró el artista solicitado.'); return; }
      let artistQuery = db.from('artists').select('*');
      artistQuery = idParam ? artistQuery.eq('id',idParam) : artistQuery.eq('slug',slugParam);
      const { data: artist, error: artistError } = await artistQuery.maybeSingle();
      if (artistError || !artist){ container.innerHTML = empty('No se pudo encontrar este artista.'); $('#pageTitle').textContent = 'Artista no encontrado'; $('#pageSubtitle').textContent = 'Vuelve al listado de artistas e intenta nuevamente.'; return; }
      document.title = `${artist.name || 'Artista'} | Juntos Hacia Dios`;
      $('#pageTitle').textContent = artist.name || 'Artista';
      $('#pageSubtitle').textContent = artist.description || artist.artist_type || 'Artista del cancionero.';

      const { data: ownRelations, error: ownError } = await db.from('song_artists').select('song_id,role').eq('artist_id',artist.id);
      if (ownError){ container.innerHTML = empty(`No se pudieron cargar las canciones: ${ownError.message}`); return; }
      const songIds = [...new Set((ownRelations || []).map((row) => row.song_id).filter(Boolean))];
      const [songRes, relationRes, albumRes] = await Promise.all([
        songIds.length ? db.from('songs').select('*').in('id',songIds) : Promise.resolve({data:[],error:null}),
        songIds.length ? db.from('song_artists').select('song_id,artist_id,role,artists(id,name,slug,artist_type)').in('song_id',songIds) : Promise.resolve({data:[],error:null}),
        db.from('albums').select('*').eq('artist_id',artist.id).order('title',{ascending:true})
      ]);
      if (songRes.error || relationRes.error || albumRes.error){ container.innerHTML = empty('No se pudo completar el perfil del artista.'); return; }
      const songs = orderSongs(songRes.data || []);
      const recent = songs.slice(0,4);
      const visibleSongs = songs.slice(0,8);
      const hiddenSongs = songs.slice(8);
      const collaborators = new Map();
      (relationRes.data || []).forEach((row) => {
        const collaborator = row.artists;
        if (!collaborator || String(row.artist_id) === String(artist.id)) return;
        const key = String(collaborator.id);
        if (!collaborators.has(key)) collaborators.set(key,{ person: collaborator, songs: new Set() });
        collaborators.get(key).songs.add(String(row.song_id));
      });
      const collaborationList = [...collaborators.values()].sort((a,b) => a.person.name.localeCompare(b.person.name,'es'));
      container.innerHTML = `
        <article class="artist-profile-card">
          <div class="artist-profile-head"><div class="artist-profile-avatar">${esc(initials(artist.name))}</div><div><p class="hero-kicker">${esc(artist.artist_type || 'Artista')}</p><h1>${esc(artist.name || 'Artista')}</h1></div></div>
          <p>${esc(artist.description || 'Artista o ministerio dentro del cancionero.')}</p>
          <div class="song-filters"><span class="filter-btn">${songs.length} ${songs.length === 1 ? 'canción' : 'canciones'}</span><span class="filter-btn">${(albumRes.data || []).length} ${(albumRes.data || []).length === 1 ? 'álbum' : 'álbumes'}</span><span class="filter-btn">${collaborationList.length} ${collaborationList.length === 1 ? 'colaboración' : 'colaboraciones'}</span></div>
        </article>
        <section class="artist-section"><div class="section-heading split-heading"><div><p class="hero-kicker">Lo más reciente</p><h2>Canciones recientes</h2></div><a class="text-link" href="#todasLasCanciones">Ver canciones</a></div><div class="songs-grid">${recent.length ? recent.map(songRow).join('') : empty('Aún no hay canciones publicadas para este artista.')}</div></section>
        <section class="artist-section" id="todasLasCanciones"><div class="section-heading"><p class="hero-kicker">Cancionero</p><h2>Canciones</h2></div><div class="artist-song-list">${visibleSongs.length ? visibleSongs.map(songRow).join('') : empty('Aún no hay canciones disponibles.')}</div>${hiddenSongs.length ? `<details class="artist-more"><summary>Ver las ${hiddenSongs.length} canciones restantes</summary><div class="artist-song-list">${hiddenSongs.map(songRow).join('')}</div></details>` : ''}</section>
        <section class="artist-section"><div class="section-heading"><p class="hero-kicker">Discografía</p><h2>Álbumes</h2></div><div class="quick-cards">${(albumRes.data || []).length ? (albumRes.data || []).map(albumCard).join('') : empty('Este artista aún no tiene álbumes registrados.')}</div></section>
        <section class="artist-section"><div class="section-heading"><p class="hero-kicker">Juntos en canción</p><h2>Colaboraciones</h2></div><div class="quick-cards">${collaborationList.length ? collaborationList.map((item) => collaborationCard(item.person,item.songs.size)).join('') : empty('Aún no hay colaboraciones registradas para este artista.')}</div></section>`;
    }
    initNav(); loadProfile(); document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
