<!doctype html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Canción | Juntos Hacia Dios</title><meta name="description" content="Detalle de canción con letra, tono, acordes y recursos."><link rel="stylesheet" href="style.css?v=2"><link rel="stylesheet" href="detalles.css?v=1"><style>#songLinks[hidden]{display:none!important}#songLinks{display:grid;gap:10px;margin-top:26px;padding-top:22px;border-top:1px solid var(--border)}#songLinks:before{content:"Tutoriales y enlaces";display:block;margin-bottom:4px;color:var(--gold);font-size:1.35rem;font-weight:800}#songLinks .quick-card{position:relative;display:grid;grid-template-columns:38px minmax(0,1fr) 28px;align-items:center;gap:13px;margin:0;padding:14px 16px;border:1px solid var(--border);border-radius:18px;background:var(--card-soft);color:var(--text);text-decoration:none;transition:transform .2s ease,border-color .2s ease,background .2s ease}#songLinks .quick-card:hover{transform:translateY(-2px);border-color:rgba(246,196,83,.6);background:var(--card)}#songLinks .quick-card:before{content:"🔗";width:38px;height:38px;display:grid;place-items:center;border-radius:50%;background:rgba(246,196,83,.14);font-size:1.15rem}#songLinks .quick-card:after{content:"›";width:28px;height:28px;display:grid;place-items:center;border-radius:50%;background:rgba(246,196,83,.12);color:var(--gold);font-size:1.25rem;font-weight:900}#songLinks .quick-card h3{grid-column:2;margin:0;color:var(--text);font-size:1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}#songLinks .quick-card p{grid-column:2;margin:4px 0 0;color:var(--muted);font-size:.88rem;overflow-wrap:anywhere}#songLinks .song-link-item:before,#songLinks .song-link-item:after{content:none!important;display:none!important}#songLinks .song-link-item{grid-template-columns:38px minmax(0,1fr) 28px!important}#songLinks .link-icon,#songLinks .link-arrow{display:grid;place-items:center;border-radius:50%}#songLinks .link-icon{width:38px;height:38px;background:rgba(246,196,83,.14);font-size:1.15rem}#songLinks .link-copy{min-width:0;display:grid;gap:3px}#songLinks .link-copy strong{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}#songLinks .link-copy small{overflow-wrap:anywhere;color:var(--muted)}#songLinks .link-arrow{width:28px;height:28px;background:rgba(246,196,83,.12);color:var(--gold);font-size:1.25rem;font-weight:900}@media(max-width:560px){#songLinks .quick-card{padding:13px}#songLinks .quick-card:before,#songLinks .link-icon{width:34px;height:34px}}</style><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="Supabase.js?v=1"></script><script src="cancion.js?v=4" defer></script></head><body><header><nav class="navbar"><a class="brand" href="index.html" aria-label="Juntos Hacia Dios"><span class="brand-icon">✝</span><span>Juntos Hacia Dios</span></a><button class="menu-toggle" id="menuToggle" type="button" aria-label="Abrir menú">☰</button><div class="nav-menu" id="navMenu"><a href="index.html">Inicio</a><a class="active" href="canciones.html">Canciones</a><a href="artistas.html">Artistas</a><a href="categorias.html">Categorías</a><a href="albumes.html">Álbumes</a><a href="donaciones.html">Donaciones</a><button class="theme-toggle" id="themeToggle" type="button">🌙</button></div></nav></header><main><section class="hero"><div class="hero-content"><p class="hero-kicker" id="songType">Canción</p><h1 id="songTitle">Cargando canción...</h1><p id="songSubtitle">Un momento por favor.</p></div></section><section class="section"><article class="intro-card"><div id="songMeta" class="song-filters"></div><h2>Letra</h2><div id="songLyrics" class="lyrics muted-text">Cargando letra...</div><div id="songLinks" class="quick-cards"><article class="quick-card"><h3>Sin recursos</h3><p>Aún no hay enlaces disponibles.</p></article></div></article></section></main><footer><p>© <span id="year">2026</span> Juntos Hacia Dios</p><p><a href="index.html">Inicio</a> · <a href="canciones.html">Canciones</a> · <a href="albumes.html">Álbumes</a></p></footer><script>document.getElementById("year").textContent=new Date().getFullYear();(()=>{const icon=t=>{t=String(t||"").toLowerCase();if(t.includes("guitarra"))return"🎸";if(t.includes("piano"))return"🎹";if(t.includes("youtube"))return"▶️";if(t.includes("tiktok"))return"🎵";if(t.includes("instagram"))return"📷";if(t.includes("facebook"))return"f";if(t.includes("spotify"))return"🎧";if(t.includes("canal"))return"📺";return"🔗"};const start=()=>{const root=document.getElementById("songLinks"),title=document.getElementById("songTitle");if(!root)return;const sync=()=>{const links=[...root.querySelectorAll("a.quick-card:not(.song-link-item)")];if(links.length){root.hidden=false;links.forEach(card=>{const heading=card.querySelector("h3")?.textContent?.trim()||"Enlace",meta=card.querySelector("p")?.textContent?.trim()||"Abrir recurso",href=card.getAttribute("href")||"#";card.classList.add("song-link-item");card.innerHTML=`<span class="link-icon">${icon(`${heading} ${meta}`)}</span><span class="link-copy"><strong>${heading}</strong><small>${meta}</small></span><span class="link-arrow">›</span>`;card.setAttribute("href",href)});return}const loaded=title&&!/cargando/i.test(title.textContent||"");if(loaded&&/sin recursos|aún no hay enlaces/i.test(root.textContent||""))root.hidden=true};new MutationObserver(sync).observe(root,{childList:true,subtree:true});title&&new MutationObserver(sync).observe(title,{childList:true,subtree:true});sync()};document.readyState==="loading"?document.addEventListener("DOMContentLoaded",start):start()})()</script></body></html>
