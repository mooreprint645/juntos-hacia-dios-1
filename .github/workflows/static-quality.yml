name: Static quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find . -type f -name '*.js' -not -path './node_modules/*' -print0)
      - name: Check required public files
        shell: bash
        run: |
          set -euo pipefail
          required=(index.html Supabase.js robots.txt)
          for file in "${required[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "Missing required public file: $file" >&2
              exit 1
            fi
          done
          if [[ ! -f sitemap && ! -f sitemap.xml ]]; then
            echo "Missing sitemap or sitemap.xml" >&2
            exit 1
          fi
      - name: Reject private Supabase secrets
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE --exclude-dir=.git --exclude='*.md' '(service_role|sb_secret_)' .; then
            echo 'A private Supabase key appears to be committed.' >&2
            exit 1
          fi
